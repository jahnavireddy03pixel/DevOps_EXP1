<body>
    <center>
        <h1>Align Agency Registration</h1>
        <p>Fill the form below to register</p>
    </center>
    <div style="width:50%; margin:auto;">
    <form>
        <div style="width:50%; margin:auto; text-align:center;"></div>
        <label>Full Name:</label><br>
        <input type="text"><br><br>
        <label>Email:</label><br>
        <input type="email"><br><br>
        <label>Phone Number:</label><br>
        <input type="tel"><br><br>
        <label>Date of Birth:</label><br>
        <input type="date"><br><br>
        <label>Gender:</label><br>
        <select>
            <option>Select</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
        </select>
        <br><br>
        <label>Location:</label><br>
        <input type="text" placeholder="City"><br><br>
        <h2>Measurements</h2>
        <label>Height:</label><br>
        <input type="text" placeholder="170 cm"><br><br>
        <label>Weight:</label><br>
        <input type="text" placeholder="55 kg"><br><br>
        <label>Eye Color:</label><br>
        <input type="text"><br><br>
        <label>Hair Color:</label><br>
        <input type="text"><br><br>
        <h2>Modeling Type</h2>
        <input type="checkbox"> Runway <br>
        <input type="checkbox"> Commercial <br>
        <input type="checkbox"> Editorial <br>
        <input type="checkbox"> Fitness <br><br>
        <h2>Experience</h2>
        <label>Experience Level:</label><br>
        <select>
            <option>Fresher</option>
            <option>Experienced</option>
        </select>
        <br><br>
        <label>Instagram:</label><br>
        <input type="text" placeholder="@username"><br><br>
        <label>Portfolio Link:</label><br>
        <input type="url"><br><br>
        <label>Additional Notes:</label><br>
        <textarea rows="4" cols="40"></textarea>
        <br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
 </body>
</html>
